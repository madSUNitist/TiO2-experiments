name: Build Report PDF

on:
  push:
    branches: [main]
    paths:
      - "docs/full_report.typ"
      - "docs/refs/**"
      - "docs/build_report.py"
      - ".github/workflows/build-report.yml"
  pull_request:
    paths:
      - "docs/full_report.typ"
      - "docs/refs/**"
      - "docs/build_report.py"
      - ".github/workflows/build-report.yml"
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CJK fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: Configure font aliases
        run: |
          mkdir -p ~/.config/fontconfig
          cat > ~/.config/fontconfig/fonts.conf << 'FCEOF'
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <alias>
              <family>Source Han Sans SC</family>
              <prefer><family>Noto Sans CJK SC</family></prefer>
            </alias>
            <alias>
              <family>Source Han Serif</family>
              <prefer><family>Noto Serif CJK SC</family></prefer>
            </alias>
          </fontconfig>
          FCEOF
          fc-cache -fv

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Build PDF
        run: python docs/build_report.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: full_report
          path: docs/full_report.pdf
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: docs/full_report.pdf
